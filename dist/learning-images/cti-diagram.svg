<style>
  :root {
    --bg-primary: #0b0c0e;
    --bg-secondary: #1a1b26;
    --text-primary: #ffffff;
    --text-muted: #c6c5c5;
    --text-secondary: #a0a1b0;
    --border-primary: #3a3c5a;
    --brand-purple: #7367f0;
  }
</style>


<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--brand-purple, #7367f0)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="480" fill="var(--bg-primary, #0b0c0e)"/>
  <!-- Title -->
  <text font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="var(--text-primary, #ffffff)" x="340" y="36" text-anchor="middle">CTI — THREE TIERS OF THREAT INTELLIGENCE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="10" fill="var(--text-secondary, #5c5f70)" x="340" y="52" text-anchor="middle">Raw IOCs are the lowest-value tier. Most organisations stop there.</text>
  <!-- Tier 1: Strategic -->
  <rect x="40" y="70" width="175" height="270" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="0.75"/>
  <rect x="40" y="70" width="175" height="36" rx="8" fill="var(--brand-purple, #7367f0)" opacity="0.15"/>
  <rect x="40" y="94" width="175" height="12" fill="var(--bg-secondary, #1a1b26)"/>
  <text font-family="Space Grotesk,sans-serif" font-size="11" font-weight="700" fill="var(--brand-purple, #7367f0)" x="128" y="93" text-anchor="middle">STRATEGIC</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="128" y="120" text-anchor="middle">Audience: Board · CISO · Exec</text>
  <line x1="56" y1="130" x2="199" y2="130" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="128" y="150" text-anchor="middle">Threat actor motivations</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="128" y="166" text-anchor="middle">Geopolitical landscape</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="128" y="182" text-anchor="middle">Industry targeting trends</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="128" y="198" text-anchor="middle">12–24 month horizon</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="128" y="214" text-anchor="middle">No IOCs — pure analysis</text>
  <line x1="56" y1="226" x2="199" y2="226" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--brand-purple, #7367f0)" x="128" y="244" text-anchor="middle">Output</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="128" y="260" text-anchor="middle">Budget decisions</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="128" y="276" text-anchor="middle">Program priorities</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="128" y="292" text-anchor="middle">Risk appetite framing</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="128" y="308" text-anchor="middle">Board communication</text>
  <!-- Tier 2: Operational -->
  <rect x="253" y="70" width="175" height="270" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="0.75"/>
  <rect x="253" y="70" width="175" height="36" rx="8" fill="var(--brand-purple, #7367f0)" opacity="0.15"/>
  <rect x="253" y="94" width="175" height="12" fill="var(--bg-secondary, #1a1b26)"/>
  <text font-family="Space Grotesk,sans-serif" font-size="11" font-weight="700" fill="var(--brand-purple, #7367f0)" x="340" y="93" text-anchor="middle">OPERATIONAL</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="120" text-anchor="middle">Audience: Security leadership · Analysts</text>
  <line x1="269" y1="130" x2="412" y2="130" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="150" text-anchor="middle">Active campaigns</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="166" text-anchor="middle">Imminent threats</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="182" text-anchor="middle">TTPs in use now</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="198" text-anchor="middle">Sector-specific targeting</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="214" text-anchor="middle">1–4 week horizon</text>
  <line x1="269" y1="226" x2="412" y2="226" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--brand-purple, #7367f0)" x="340" y="244" text-anchor="middle">Output</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="260" text-anchor="middle">Detection priority shifts</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="276" text-anchor="middle">Threat hunting focus</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="292" text-anchor="middle">IR posture changes</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="308" text-anchor="middle">Vendor risk alerts</text>
  <!-- Tier 3: Tactical -->
  <rect x="465" y="70" width="175" height="270" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <rect x="465" y="70" width="175" height="36" rx="8" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="11" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="552" y="93" text-anchor="middle">TACTICAL</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="552" y="120" text-anchor="middle">Audience: SOC · Detection engineers</text>
  <line x1="481" y1="130" x2="624" y2="130" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="552" y="150" text-anchor="middle">IOCs · Malware hashes</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="552" y="166" text-anchor="middle">C2 domains · IPs</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="552" y="182" text-anchor="middle">ATT&amp;CK technique IDs</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="552" y="198" text-anchor="middle">Exploit signatures</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="552" y="214" text-anchor="middle">Short shelf life</text>
  <line x1="481" y1="226" x2="624" y2="226" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="552" y="244" text-anchor="middle">Output</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="552" y="260" text-anchor="middle">SIEM rules</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="552" y="276" text-anchor="middle">EDR blocklists</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="552" y="292" text-anchor="middle">Firewall rules</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="552" y="308" text-anchor="middle">Threat hunting queries</text>
  <!-- Arrows between tiers -->
  <line x1="215" y1="205" x2="251" y2="205" stroke="var(--brand-purple, #7367f0)" stroke-width="0.75" opacity="0.5" fill="none" marker-end="url(#arr)"/>
  <line x1="428" y1="205" x2="463" y2="205" stroke="var(--brand-purple, #7367f0)" stroke-width="0.75" opacity="0.5" fill="none" marker-end="url(#arr)"/>
  <!-- Value label on tactical -->
  <rect x="465" y="356" width="175" height="20" rx="4" fill="var(--bg-primary, #0b0c0e)" stroke="#E24B4A" stroke-width="0.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="#E24B4A" x="552" y="370" text-anchor="middle">Most orgs stop here — lowest value</text>
  <!-- Bottom note -->
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="420" text-anchor="middle">IOCs rotate in hours. TTPs persist for months. Strategic intelligence is valid for years.</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="436" text-anchor="middle">The organisations that operationalise all three tiers detect threats weeks earlier than those that don't.</text>
</svg>