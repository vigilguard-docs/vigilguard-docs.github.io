<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2ec97a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="480" fill="var(--bg-primary, #0b0c0e)"/>
  <!-- Title -->
  <text font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="var(--text-primary, #ffffff)" x="340" y="36" text-anchor="middle">SOC — DETECTION &amp; RESPONSE LIFECYCLE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="10" fill="var(--text-secondary, #5c5f70)" x="340" y="52" text-anchor="middle">Alert volume is not the metric. Mean time to detect a real threat is.</text>
  <!-- Data sources column -->
  <rect x="40" y="70" width="130" height="300" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="105" y="92" text-anchor="middle">DATA SOURCES</text>
  <line x1="56" y1="100" x2="154" y2="100" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="120" text-anchor="middle">Endpoint (EDR)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="138" text-anchor="middle">Network (NDR)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="156" text-anchor="middle">Identity (ITDR)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="174" text-anchor="middle">Cloud (CNAPP)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="192" text-anchor="middle">SaaS apps</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="210" text-anchor="middle">Email security</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="228" text-anchor="middle">Firewall · Proxy</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="246" text-anchor="middle">DNS · DHCP</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="264" text-anchor="middle">UEBA signals</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="282" text-anchor="middle">Threat intel feeds</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="300" text-anchor="middle">Vuln scan results</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="318" text-anchor="middle">BAS findings</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="105" y="336" text-anchor="middle">EASM alerts</text>
  <!-- Arrow to SIEM -->
  <line x1="170" y1="220" x2="210" y2="220" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <!-- SIEM box -->
  <rect x="210" y="180" width="120" height="80" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="11" font-weight="700" fill="var(--brand-purple, #7367f0)" x="270" y="212" text-anchor="middle">SIEM / SOAR</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="270" y="228" text-anchor="middle">Correlate · Enrich</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="270" y="244" text-anchor="middle">Automate triage</text>
  <!-- Arrow to alert queue -->
  <line x1="330" y1="220" x2="370" y2="220" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <!-- Alert queue split -->
  <!-- False positive path -->
  <line x1="430" y1="210" x2="430" y2="155" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2" fill="none"/>
  <rect x="370" y="130" width="120" height="36" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--text-secondary, #5c5f70)" x="430" y="147" text-anchor="middle">False positive</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="430" y="160" text-anchor="middle">Closed · Rule tuning</text>
  <!-- True positive path -->
  <rect x="370" y="200" width="120" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--brand-purple, #7367f0)" x="430" y="216" text-anchor="middle">Alert triage</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="430" y="230" text-anchor="middle">T1 → T2 escalation</text>
  <!-- Arrow to investigation -->
  <line x1="490" y1="220" x2="530" y2="220" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <!-- Investigation -->
  <rect x="530" y="180" width="120" height="80" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--brand-purple, #7367f0)" x="590" y="208" text-anchor="middle">INVESTIGATE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="590" y="224" text-anchor="middle">Scope · Timeline</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="590" y="240" text-anchor="middle">Containment plan</text>
  <!-- Threat hunting — proactive path -->
  <rect x="210" y="340" width="120" height="60" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="#2ec97a" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#2ec97a" x="270" y="362" text-anchor="middle">THREAT HUNTING</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="270" y="378" text-anchor="middle">Proactive · Hypothesis</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="270" y="392" text-anchor="middle">No alert required</text>
  <!-- Detection engineering -->
  <rect x="370" y="340" width="120" height="60" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="#2ec97a" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#2ec97a" x="430" y="362" text-anchor="middle">DETECTION ENG.</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="430" y="378" text-anchor="middle">Write · Test · Tune</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="430" y="392" text-anchor="middle">ATT&amp;CK coverage</text>
  <!-- Response -->
  <rect x="530" y="340" width="120" height="60" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="#E24B4A" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#E24B4A" x="590" y="362" text-anchor="middle">RESPOND</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="590" y="378" text-anchor="middle">Contain · Eradicate</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="590" y="392" text-anchor="middle">Recover · PIR</text>
  <!-- Connecting lines for lower row -->
  <line x1="330" y1="370" x2="368" y2="370" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <line x1="490" y1="370" x2="528" y2="370" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <line x1="590" y1="340" x2="590" y2="262" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <!-- Key metric callout -->
  <rect x="40" y="400" width="145" height="52" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--brand-purple, #7367f0)" x="113" y="418" text-anchor="middle">KEY METRIC</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="113" y="434" text-anchor="middle">MTTD — Mean time to detect</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="113" y="446" text-anchor="middle">Not: alerts closed per day</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="430" y="456" text-anchor="middle">90%+ false positive rate is a detection engineering problem, not a staffing problem.</text>
</svg>