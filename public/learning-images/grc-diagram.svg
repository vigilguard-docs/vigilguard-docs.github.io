<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="480" fill="var(--bg-primary, #0b0c0e)"/>
  <!-- Title -->
  <text font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="var(--text-primary, #ffffff)" x="340" y="36" text-anchor="middle">GRC — GOVERNANCE, RISK &amp; COMPLIANCE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="10" fill="var(--text-secondary, #5c5f70)" x="340" y="52" text-anchor="middle">Three disciplines that only work when integrated — not managed as separate programs</text>
  <!-- Three pillars side by side -->
  <!-- GOVERNANCE -->
  <rect x="40" y="70" width="180" height="260" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <rect x="40" y="70" width="180" height="34" rx="8" fill="var(--brand-purple, #7367f0)" opacity="0.4"/>
  <rect x="40" y="92" width="180" height="12" fill="var(--bg-secondary, #1a1b26)"/>
  <text font-family="Space Grotesk,sans-serif" font-size="12" font-weight="700" fill="var(--brand-purple, #7367f0)" x="130" y="92" text-anchor="middle">GOVERNANCE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="130" y="118" text-anchor="middle">Who decides · Who's accountable</text>
  <line x1="56" y1="126" x2="204" y2="126" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="146" text-anchor="middle">Board risk oversight</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="162" text-anchor="middle">Risk appetite statement</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="178" text-anchor="middle">Policy ownership</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="194" text-anchor="middle">Decision rights</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="210" text-anchor="middle">Escalation paths</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="226" text-anchor="middle">Exec reporting cadence</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="242" text-anchor="middle">RACI for risk decisions</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="258" text-anchor="middle">Security strategy alignment</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="274" text-anchor="middle">Business unit accountability</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="290" text-anchor="middle">CISO authority scope</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="130" y="306" text-anchor="middle">Audit committee liaison</text>
  <!-- RISK -->
  <rect x="250" y="70" width="180" height="260" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <rect x="250" y="70" width="180" height="34" rx="8" fill="var(--brand-purple, #7367f0)" opacity="0.4"/>
  <rect x="250" y="92" width="180" height="12" fill="var(--bg-secondary, #1a1b26)"/>
  <text font-family="Space Grotesk,sans-serif" font-size="12" font-weight="700" fill="var(--brand-purple, #7367f0)" x="340" y="92" text-anchor="middle">RISK</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="118" text-anchor="middle">What could go wrong · How bad</text>
  <line x1="266" y1="126" x2="414" y2="126" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="146" text-anchor="middle">Risk identification</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="162" text-anchor="middle">Quantification (ALE)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="178" text-anchor="middle">Risk register · Named owners</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="194" text-anchor="middle">Accept · Mitigate · Transfer</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="210" text-anchor="middle">Continuous monitoring</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="226" text-anchor="middle">Third-party risk (TPRM)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="242" text-anchor="middle">Technical exposure (EASM)</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="258" text-anchor="middle">Residual risk reporting</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="274" text-anchor="middle">Tolerance thresholds</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="290" text-anchor="middle">Scenario modelling</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="306" text-anchor="middle">Cyber insurance alignment</text>
  <!-- COMPLIANCE -->
  <rect x="460" y="70" width="180" height="260" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <rect x="460" y="70" width="180" height="34" rx="8" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="12" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="550" y="92" text-anchor="middle">COMPLIANCE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="550" y="118" text-anchor="middle">Are you meeting the standard?</text>
  <line x1="476" y1="126" x2="624" y2="126" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="146" text-anchor="middle">GDPR · CCPA</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="162" text-anchor="middle">ISO 27001 · SOC 2</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="178" text-anchor="middle">NIST CSF · PCI DSS</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="194" text-anchor="middle">SEC cyber disclosure</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="210" text-anchor="middle">DORA · NIS2</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="226" text-anchor="middle">Evidence collection</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="242" text-anchor="middle">Control testing</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="258" text-anchor="middle">Audit management</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="550" y="274" text-anchor="middle">Gap assessments</text>
  <!-- Warning note -->
  <rect x="468" y="284" width="164" height="28" rx="4" fill="var(--bg-primary, #0b0c0e)" stroke="#E24B4A" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#E24B4A" x="550" y="296" text-anchor="middle">Compliance ≠ Security</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="550" y="307" text-anchor="middle">It's a floor, not a ceiling</text>
  <!-- Connecting arrows between pillars -->
  <line x1="220" y1="200" x2="248" y2="200" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <line x1="430" y1="200" x2="458" y2="200" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" opacity="0.9" fill="none" marker-end="url(#arr)"/>
  <!-- Bottom: reporting chain -->
  <rect x="40" y="362" width="600" height="60" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--brand-purple, #7367f0)" x="340" y="382" text-anchor="middle">BOARD REPORTING REQUIREMENT</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="398" text-anchor="middle">SEC rules · DORA · Director liability · Post-breach litigation</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="413" text-anchor="middle">Boards are now legally accountable for risk oversight. GRC is how CISOs make that conversation possible.</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="450" text-anchor="middle">GRC without integration produces silos. Integrated GRC produces a defensible, board-level risk position.</text>
</svg>