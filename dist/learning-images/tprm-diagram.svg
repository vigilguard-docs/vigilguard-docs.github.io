<style>
  :root {
    --bg-primary: #0b0c0e;
    --bg-secondary: #1a1b26;
    --text-primary: #ffffff;
    --text-muted: #c6c5c5;
    --text-secondary: #a0a1b0;
    --border-primary: #3a3c5a;
    --brand-purple: #7367f0;
  }
</style>


<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="500" fill="var(--bg-primary, #0b0c0e)"/>
  <!-- Title -->
  <text font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="var(--text-primary, #ffffff)" x="340" y="36" text-anchor="middle">TPRM — VENDOR RISK ECOSYSTEM</text>
  <text font-family="Space Grotesk,sans-serif" font-size="10" fill="var(--text-secondary, #5c5f70)" x="340" y="52" text-anchor="middle">Every vendor connection is a potential attack path into your environment</text>
  <!-- Center org -->
  <rect x="280" y="205" width="120" height="60" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.5"/>
  <text font-family="Space Grotesk,sans-serif" font-size="12" font-weight="700" fill="var(--brand-purple, #7367f0)" x="340" y="230" text-anchor="middle">YOUR ORG</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="340" y="248" text-anchor="middle">Systems · Data · Operations</text>
  <!-- Vendor nodes and spokes -->
  <!-- Top: Cloud Provider (green - low risk) -->
  <line x1="340" y1="205" x2="340" y2="140" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.75" fill="none"/>
  <rect x="278" y="100" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#2ec97a" stroke-width="0.75"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#2ec97a" x="340" y="118" text-anchor="middle">Cloud Provider</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="131" text-anchor="middle">AWS / Azure / GCP</text>
  <rect x="392" y="104" width="36" height="14" rx="3" fill="#2ec97a" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#2ec97a" x="410" y="114" text-anchor="middle">LOW</text>
  <!-- Top-right: Payment Processor (amber - medium) -->
  <line x1="400" y1="220" x2="490" y2="160" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.75" fill="none"/>
  <rect x="448" y="128" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#e6a817" stroke-width="0.75"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#e6a817" x="510" y="146" text-anchor="middle">Payment Processor</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="510" y="159" text-anchor="middle">PCI data · API access</text>
  <rect x="560" y="132" width="44" height="14" rx="3" fill="#e6a817" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#e6a817" x="582" y="142" text-anchor="middle">MEDIUM</text>
  <!-- Right: Managed SOC (amber - medium) -->
  <line x1="400" y1="235" x2="510" y2="235" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.75" fill="none"/>
  <rect x="510" y="215" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#e6a817" stroke-width="0.75"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#e6a817" x="572" y="233" text-anchor="middle">Managed SOC</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="572" y="246" text-anchor="middle">Network · Log access</text>
  <rect x="600" y="219" width="44" height="14" rx="3" fill="#e6a817" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#e6a817" x="622" y="229" text-anchor="middle">MEDIUM</text>
  <!-- Bottom-right: SaaS HR (red - high) -->
  <line x1="400" y1="255" x2="490" y2="310" stroke="#E24B4A" stroke-width="0.75" stroke-dasharray="4 2" fill="none"/>
  <rect x="448" y="302" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#E24B4A" stroke-width="1"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#E24B4A" x="510" y="320" text-anchor="middle">SaaS HR Platform</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="510" y="333" text-anchor="middle">Employee PII · Payroll</text>
  <rect x="554" y="306" width="34" height="14" rx="3" fill="#E24B4A" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#E24B4A" x="571" y="316" text-anchor="middle">HIGH</text>
  <!-- Bottom: Law Firm (red - high, unassessed) -->
  <line x1="340" y1="265" x2="340" y2="340" stroke="#E24B4A" stroke-width="0.75" stroke-dasharray="4 2" fill="none"/>
  <rect x="278" y="340" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#E24B4A" stroke-width="1"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#E24B4A" x="340" y="358" text-anchor="middle">Legal / Law Firm</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="371" text-anchor="middle">M&amp;A docs · Contracts</text>
  <rect x="381" y="344" width="34" height="14" rx="3" fill="#E24B4A" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#E24B4A" x="398" y="354" text-anchor="middle">HIGH</text>
  <!-- Bottom-left: Logistics (green) -->
  <line x1="280" y1="255" x2="190" y2="310" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.75" fill="none"/>
  <rect x="68" y="302" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#2ec97a" stroke-width="0.75"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#2ec97a" x="130" y="320" text-anchor="middle">Logistics Partner</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="130" y="333" text-anchor="middle">API · Order data</text>
  <rect x="162" y="306" width="30" height="14" rx="3" fill="#2ec97a" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#2ec97a" x="177" y="316" text-anchor="middle">LOW</text>
  <!-- Left: IT MSP (amber) -->
  <line x1="280" y1="235" x2="170" y2="235" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.75" fill="none"/>
  <rect x="46" y="215" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#e6a817" stroke-width="0.75"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#e6a817" x="108" y="233" text-anchor="middle">IT / MSP</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="108" y="246" text-anchor="middle">Admin · Network access</text>
  <rect x="140" y="219" width="44" height="14" rx="3" fill="#e6a817" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#e6a817" x="162" y="229" text-anchor="middle">MEDIUM</text>
  <!-- Top-left: Software Vendor (green) -->
  <line x1="280" y1="220" x2="190" y2="160" stroke="var(--border-primary, #3a3c5a)" stroke-width="0.75" fill="none"/>
  <rect x="68" y="128" width="124" height="40" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#2ec97a" stroke-width="0.75"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="#2ec97a" x="130" y="146" text-anchor="middle">Software Vendor</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="130" y="159" text-anchor="middle">SaaS · Integrations</text>
  <rect x="170" y="132" width="30" height="14" rx="3" fill="#2ec97a" opacity="0.15"/>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="#2ec97a" x="185" y="142" text-anchor="middle">LOW</text>
  <!-- Legend -->
  <rect x="40" y="430" width="10" height="10" rx="2" fill="#2ec97a" opacity="0.8"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="56" y="440">Low risk · assessed</text>
  <rect x="180" y="430" width="10" height="10" rx="2" fill="#e6a817" opacity="0.8"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="196" y="440">Medium risk · monitor</text>
  <rect x="340" y="430" width="10" height="10" rx="2" fill="#E24B4A" opacity="0.8"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="356" y="440">High risk · immediate action</text>
  <line x1="520" y1="432" x2="548" y2="432" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 2" fill="none"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="554" y="437">unassessed path</text>
</svg>