<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2ec97a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="480" fill="var(--bg-primary, #0b0c0e)"/>
  <!-- Title -->
  <text font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="var(--text-primary, #ffffff)" x="340" y="36" text-anchor="middle">ZERO TRUST ARCHITECTURE — FIVE PILLARS</text>
  <text font-family="Space Grotesk,sans-serif" font-size="10" fill="var(--text-secondary, #5c5f70)" x="340" y="52" text-anchor="middle">Never trust, always verify — every request, every time, regardless of network location</text>
  <!-- Access request flow at top -->
  <rect x="40" y="68" width="100" height="36" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="90" y="83" text-anchor="middle">ACCESS</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="90" y="97" text-anchor="middle">REQUEST</text>
  <line x1="140" y1="86" x2="200" y2="86" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <!-- Policy engine -->
  <rect x="200" y="62" width="140" height="48" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--brand-purple, #7367f0)" x="270" y="82" text-anchor="middle">POLICY ENGINE</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="270" y="98" text-anchor="middle">Verify all five pillars</text>
  <!-- Grant -->
  <line x1="340" y1="80" x2="420" y2="80" stroke="#2ec97a" stroke-width="1.2" fill="none" marker-end="url(#arr-green)"/>
  <rect x="420" y="62" width="100" height="36" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#2ec97a" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="#2ec97a" x="470" y="77" text-anchor="middle">ACCESS</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="#2ec97a" x="470" y="91" text-anchor="middle">GRANTED</text>
  <!-- Deny -->
  <line x1="340" y1="100" x2="420" y2="116" stroke="#E24B4A" stroke-width="1.2" fill="none" marker-end="url(#arr-red)"/>
  <rect x="420" y="106" width="100" height="36" rx="6" fill="var(--bg-secondary, #1a1b26)" stroke="#E24B4A" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="#E24B4A" x="470" y="121" text-anchor="middle">ACCESS</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" font-weight="700" fill="#E24B4A" x="470" y="135" text-anchor="middle">DENIED</text>
  <!-- Five pillars below -->
  <!-- Pillar 1: Identity -->
  <rect x="40" y="168" width="112" height="210" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2"/>
  <rect x="40" y="168" width="112" height="30" rx="8" fill="var(--brand-purple, #7367f0)" opacity="0.4"/>
  <rect x="40" y="186" width="112" height="12" fill="var(--bg-secondary, #1a1b26)"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--brand-purple, #7367f0)" x="96" y="188" text-anchor="middle">IDENTITY</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="96" y="212" text-anchor="middle">Foundation pillar</text>
  <line x1="56" y1="220" x2="136" y2="220" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="238" text-anchor="middle">Strong MFA</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="254" text-anchor="middle">Phishing-resistant</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="270" text-anchor="middle">Continuous verify</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="286" text-anchor="middle">Session validation</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="302" text-anchor="middle">ITDR monitoring</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="318" text-anchor="middle">Non-human IDs</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="334" text-anchor="middle">Passkeys / FIDO2</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="96" y="350" text-anchor="middle">Zero standing priv.</text>
  <!-- Pillar 2: Devices -->
  <rect x="168" y="168" width="112" height="210" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <rect x="168" y="168" width="112" height="30" rx="8" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="224" y="188" text-anchor="middle">DEVICES</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="224" y="212" text-anchor="middle">Device health check</text>
  <line x1="184" y1="220" x2="264" y2="220" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="224" y="238" text-anchor="middle">Patch status</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="224" y="254" text-anchor="middle">EDR presence</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="224" y="270" text-anchor="middle">Config compliance</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="224" y="286" text-anchor="middle">Certificate valid</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="224" y="302" text-anchor="middle">Posture at auth time</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="224" y="318" text-anchor="middle">Not just enrollment</text>
  <!-- Pillar 3: Network -->
  <rect x="296" y="168" width="112" height="210" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <rect x="296" y="168" width="112" height="30" rx="8" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="352" y="188" text-anchor="middle">NETWORK</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="352" y="212" text-anchor="middle">Micro-segmentation</text>
  <line x1="312" y1="220" x2="392" y2="220" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="352" y="238" text-anchor="middle">SDP / ZTNA</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="352" y="254" text-anchor="middle">Encrypted E-W traffic</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="352" y="270" text-anchor="middle">No implicit trust</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="352" y="286" text-anchor="middle">Limits blast radius</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="352" y="302" text-anchor="middle">Not sufficient alone</text>
  <!-- Pillar 4: Applications -->
  <rect x="424" y="168" width="112" height="210" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <rect x="424" y="168" width="112" height="30" rx="8" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="480" y="188" text-anchor="middle">APPLICATIONS</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="480" y="212" text-anchor="middle">App-layer access control</text>
  <line x1="440" y1="220" x2="520" y2="220" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="480" y="238" text-anchor="middle">Per-app policy</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="480" y="254" text-anchor="middle">JIT provisioning</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="480" y="270" text-anchor="middle">Session monitoring</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="480" y="286" text-anchor="middle">No broad network access</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="480" y="302" text-anchor="middle">Continuous auth</text>
  <!-- Pillar 5: Data -->
  <rect x="552" y="168" width="112" height="210" rx="8" fill="var(--bg-secondary, #1a1b26)" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <rect x="552" y="168" width="112" height="30" rx="8" fill="none" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="10" font-weight="700" fill="var(--text-muted, #c6c5c5)" x="608" y="188" text-anchor="middle">DATA</text>
  <text font-family="Space Grotesk,sans-serif" font-size="8" fill="var(--text-secondary, #5c5f70)" x="608" y="212" text-anchor="middle">Ultimate objective</text>
  <line x1="568" y1="220" x2="648" y2="220" stroke="var(--border-primary, #3a3c5a)" stroke-width="1.2"/>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="608" y="238" text-anchor="middle">Classification</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="608" y="254" text-anchor="middle">Rights management</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="608" y="270" text-anchor="middle">Access logging</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="608" y="286" text-anchor="middle">Exfil detection</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="608" y="302" text-anchor="middle">DLP enforcement</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-muted, #c6c5c5)" x="608" y="318" text-anchor="middle">Encryption at rest</text>
  <!-- Lines from policy engine down to pillar tops -->
  <line x1="230" y1="110" x2="96" y2="168" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.9" fill="none"/>
  <line x1="250" y1="110" x2="224" y2="168" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.9" fill="none"/>
  <line x1="270" y1="110" x2="352" y2="168" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.9" fill="none"/>
  <line x1="290" y1="110" x2="480" y2="168" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.9" fill="none"/>
  <line x1="310" y1="110" x2="608" y2="168" stroke="var(--brand-purple, #7367f0)" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.9" fill="none"/>
  <!-- Bottom note -->
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="406" text-anchor="middle">Identity is highlighted because it is the load-bearing pillar. Weak identity makes all other pillars ineffective.</text>
  <text font-family="Space Grotesk,sans-serif" font-size="9" fill="var(--text-secondary, #5c5f70)" x="340" y="422" text-anchor="middle">Zero Trust is a direction, not a destination. Start with the highest-risk access patterns, expand coverage over time.</text>
</svg>